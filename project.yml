name: AniMagic

options:
  bundleIdPrefix: com.DirouDough
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  developmentLanguage: en

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    SDKROOT: iphoneos

targets:
  AniMagic:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Animagic
        excludes:
          - Configuration/Info.plist
          - Resources/**
      - path: Animagic/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.DirouDough.AniMagic
        PRODUCT_NAME: "$(TARGET_NAME)"
        INFOPLIST_FILE: Animagic/Configuration/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "This app requires camera access for AR functionality to place magic drawn animals into the real world."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "This app requires microphone access to record audio with your camera videos."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "This app requires access to save your magic drawings to your photo library."
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        ENABLE_PREVIEWS: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        UISupportedInterfaceOrientations: UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
          GCC_PREPROCESSOR_DEFINITIONS: "DEBUG=1 $(inherited)"
          ONLY_ACTIVE_ARCH: YES
          DEBUG_INFORMATION_FORMAT: dwarf
          MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
          VALIDATE_PRODUCT: YES
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          MTL_ENABLE_DEBUG_INFO: NO

schemes:
  AniMagic:
    build:
      targets:
        AniMagic: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
