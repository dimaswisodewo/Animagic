name: AniMagic

options:
  bundleIdPrefix: com.DirouDough
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: en

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    SDKROOT: iphoneos

targets:
  AniMagic:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Animagic
        excludes:
          - Info.plist
          - Assets.xcassets/**
          - Asset/Font/**
          - Core/ML/Models/**
          - Features/VirtualRoom/Resources/**
      - path: Animagic/Core/Rendering/CutoutDeformation.metal
      - path: Animagic/Assets.xcassets
        buildPhase: resources
      - path: Animagic/Asset/Font
        type: folder
        buildPhase: resources
      - path: Animagic/Core/ML/Models/AnimalSpeciesClassifierV4.mlpackage
        type: folder
        buildPhase: resources
      - path: Animagic/Features/VirtualRoom/Resources
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.DirouDough.AniMagic
        PRODUCT_NAME: "$(TARGET_NAME)"
        INFOPLIST_FILE: Animagic/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        ENABLE_PREVIEWS: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        UISupportedInterfaceOrientations: UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
          GCC_PREPROCESSOR_DEFINITIONS: "DEBUG=1 $(inherited)"
          ONLY_ACTIVE_ARCH: YES
          DEBUG_INFORMATION_FORMAT: dwarf
          MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
          VALIDATE_PRODUCT: YES
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          MTL_ENABLE_DEBUG_INFO: NO
